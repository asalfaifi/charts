# NOTE: This workflow is maintained in the https://github.com/bitnami/support repository
name: '[Support] Review based card movements'
on:
  pull_request_target: # zizmor: ignore[dangerous-triggers] Pinned reusable workflow, owner guard, and no PR code execution.
    types:
      - labeled
  issues:
    types:
      - labeled
permissions:
  contents: read
  pull-requests: write
  issues: write
# Avoid concurrency over the same issue
concurrency:
  group: card-movement-${{ github.event.issue != null && github.event.issue.number || github.event.number }}
jobs:
  call-reasign-workflow:
    if: ${{ github.repository_owner == 'bitnami' }}
    uses: bitnami/support/.github/workflows/item-labeled.yml@b045f0b718c27d29a1e26da2a27815edee88f53c # main
    secrets:
      BITNAMI_SUPPORT_BOARD_TOKEN: ${{ secrets.BITNAMI_SUPPORT_BOARD_TOKEN }}
